# Configuración del servidor
server.port=8080

# Configuración de la base de datos (PostgreSQL en Supabase)
# SPRING_DATASOURCE_URL en Render = jdbc:postgresql://user:pass@host:5432/db
# Si no está seteada, usa los valores individuales (DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:db.rxwtsgcwsaxcbmriepoz.supabase.co}:${DB_PORT:5432}/${DB_NAME:postgres}}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuración de JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Mercado Pago (dejar vacío para modo demo)
mp.access-token=${MP_ACCESS_TOKEN:}
mp.site-url=${SITE_URL:http://localhost:3000}
mp.backend-url=${BACKEND_URL:http://localhost:8080}

# Configuración de la aplicación
spring.application.name=anarobles-backend

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE