# Configuración del servidor
server.port=8080

# Conexión al pooler de Supabase (el password directo funciona para ambos)
# Pooler tiene límite de 15 conexiones - usar solo 1 para no saturarlo
spring.datasource.url=jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:5432/postgres
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# HikariCP - solo 1 conexión para no saturar el pooler (límite 15)
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuración de JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Mercado Pago
mp.access-token=${MP_ACCESS_TOKEN:value}
mp.site-url=${SITE_URL:http://localhost:3000}
mp.backend-url=${BACKEND_URL:http://localhost:8080}

# Cargar .env local si existe
spring.config.import=optional:file:.env

spring.application.name=anarobles-backend

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE