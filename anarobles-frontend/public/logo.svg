<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 150" fill="none">
  <defs>
    <linearGradient id="birdGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D9622C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B73E47;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Bird silhouette (stylized art bird/n brush stroke style) -->
  <g transform="translate(10, 20) scale(1)">
    <!-- Bird body - flowing brush stroke style -->
    <path d="M70 65 Q55 45 35 55 Q20 62 15 75 Q10 90 30 95 Q45 98 55 85 Q60 75 70 70" 
          fill="url(#birdGradient)" opacity="0.9"/>
    <!-- Bird head -->
    <circle cx="72" cy="58" r="12" fill="#D9622C"/>
    <!-- Bird beak -->
    <path d="M82 55 L95 58 L82 62 Z" fill="#194052"/>
    <!-- Bird eye -->
    <circle cx="76" cy="56" r="3" fill="#FAF6F0"/>
    <!-- Bird wing detail -->
    <path d="M50 70 Q40 80 45 95" stroke="#B73E47" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Small feather accent -->
    <path d="M60 65 Q65 60 70 65" stroke="#FAF6F0" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- Text: "Ana" -->
  <text x="130" y="85" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="600" fill="#D9622C" letter-spacing="-1">
    Ana
  </text>
  
  <!-- Text: "Robles" -->
  <text x="268" y="85" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="600" fill="#194052" letter-spacing="-1">
    Robles
  </text>
  
  <!-- Decorative brush stroke line -->
  <path d="M130 105 Q180 102 250 105" stroke="#D9622C" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Small artistic dots -->
  <circle cx="255" cy="103" r="3" fill="#194052" opacity="0.5"/>
  <circle cx="262" cy="100" r="2" fill="#D9622C" opacity="0.4"/>
</svg>